<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaKit - Global Market Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">MediaKit</h1>
            <span class="tagline">Global Market Dashboard</span>
        </div>
        <div class="header-right">
            <span class="live-dot"></span>
            <span class="live-text">Live Data</span>
        </div>
    </header>

    <!-- Country Selector -->
    <nav class="country-nav">
        <button class="country-btn active" data-country="india">
            <span class="flag">&#127470;&#127475;</span>
            <span class="country-name">India</span>
        </button>
        <button class="country-btn" data-country="usa">
            <span class="flag">&#127482;&#127480;</span>
            <span class="country-name">USA</span>
        </button>
        <button class="country-btn" data-country="uk">
            <span class="flag">&#127468;&#127463;</span>
            <span class="country-name">UK</span>
        </button>
        <button class="country-btn" data-country="china">
            <span class="flag">&#127464;&#127475;</span>
            <span class="country-name">China</span>
        </button>
        <button class="country-btn" data-country="japan">
            <span class="flag">&#127471;&#127477;</span>
            <span class="country-name">Japan</span>
        </button>
    </nav>

    <!-- Asset Selector -->
    <nav class="asset-nav">
        <button class="asset-btn active" data-asset="gold">Gold</button>
        <button class="asset-btn" data-asset="silver">Silver</button>
        <button class="asset-btn" data-asset="largecap">Large Cap</button>
        <button class="asset-btn" data-asset="midcap">Mid Cap</button>
        <button class="asset-btn" data-asset="smallcap">Small Cap</button>
    </nav>

    <!-- Current Selection Info -->
    <div class="selection-info">
        <h2 id="chart-title">Gold - India</h2>
        <p id="chart-description">MCX Gold Futures</p>
    </div>

    <!-- Main Chart -->
    <div class="chart-container">
        <div id="tradingview-chart"></div>
    </div>

    <!-- Overview Grid - Shows all 5 assets for the selected country -->
    <div class="overview-section">
        <h3 class="overview-title">Quick Overview - <span id="overview-country">India</span></h3>
        <div class="overview-grid">
            <div class="overview-card" data-asset="gold">
                <div class="overview-card-header">
                    <span class="overview-label">Gold</span>
                </div>
                <div class="overview-chart" id="overview-gold"></div>
            </div>
            <div class="overview-card" data-asset="silver">
                <div class="overview-card-header">
                    <span class="overview-label">Silver</span>
                </div>
                <div class="overview-chart" id="overview-silver"></div>
            </div>
            <div class="overview-card" data-asset="largecap">
                <div class="overview-card-header">
                    <span class="overview-label">Large Cap</span>
                </div>
                <div class="overview-chart" id="overview-largecap"></div>
            </div>
            <div class="overview-card" data-asset="midcap">
                <div class="overview-card-header">
                    <span class="overview-label">Mid Cap</span>
                </div>
                <div class="overview-chart" id="overview-midcap"></div>
            </div>
            <div class="overview-card" data-asset="smallcap">
                <div class="overview-card-header">
                    <span class="overview-label">Small Cap</span>
                </div>
                <div class="overview-chart" id="overview-smallcap"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Data provided by <a href="https://www.tradingview.com" target="_blank" rel="noopener">TradingView</a>. Charts are interactive - use scroll to zoom, drag to pan.</p>
    </footer>

    <!-- TradingView Library -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="app.js"></script>
</body>
</html>
